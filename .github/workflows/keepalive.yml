name: Keep Render app awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the site (retry in case it's waking from sleep)
        run: |
          for i in 1 2 3; do
            if curl -sf --max-time 60 https://seoul-weather-dangseo.onrender.com/ > /dev/null; then
              echo "OK on attempt $i"
              exit 0
            fi
            echo "attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "all attempts failed (non-fatal, will retry next scheduled run)"
